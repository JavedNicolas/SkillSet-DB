name: Release

# Publishes to npm when a version tag (v*) is pushed. Create one with:
#   npm version patch   # bumps package.json, commits, and tags
#   git push --follow-tags
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # prepublishOnly (typecheck + test + build) runs automatically and
      # aborts the publish if any step fails. --access public is also set
      # via publishConfig in package.json.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
