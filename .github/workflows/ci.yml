name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci installs the exact, lockfile-pinned tree. better-sqlite3 is a
      # native addon and is compiled here from its install script.
      - run: npm ci

      - run: npm run typecheck

      - run: npm test
